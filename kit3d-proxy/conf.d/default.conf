map $uri $cc_header {
  default "";
  ~*\.json$ "public, max-age=300";
  ~*\.(glb|b3dm|i3dm|cmpt)$ "public, max-age=2592000";
}

map $uri $assets_cc_header {
  default "public, max-age=300";
  ~*\.ifc$ "public, max-age=86400";
  ~*\.(tif|tiff)$ "public, max-age=86400";
}

server {
  listen 80;
  listen [::]:80;
  server_name localhost;

  resolver 127.0.0.11 valid=10s;

  set $front_upstream kit3d-front;
  set $back_upstream  kit3d-back;

  sendfile on;
  tcp_nopush on;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

  location / {
    proxy_pass http://$front_upstream;
  }

  # IFC 업로드 (5GB)
  location /api/v1/import/ {
    client_max_body_size 5g;
    proxy_request_buffering off;
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_buffering off;

    proxy_pass http://$back_upstream:8080;
  }

  # tile 다운로드
  location /api/v1/tile/ {
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_buffering off;

    proxy_pass http://$back_upstream:8080;
  }

  location /api/v1/dem/ {
    client_max_body_size 5g;
    proxy_request_buffering off;
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_buffering off;

    proxy_pass http://$back_upstream:8080;
  }

  location /api/ {
    proxy_pass http://$back_upstream:8080;
  }

  # Static assets
  location /assets/ {
    alias /data/assets/;
    try_files $uri =404;

    gzip on;
    gzip_types text/plain application/json;
    gzip_comp_level 4;
    gzip_proxied any;
    gzip_vary on;

    add_header Cache-Control $assets_cc_header always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Range, Accept, Content-Type, Authorization" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
  }

  # 3D Tiles assets (b3dm, i3dm, cmpt, glb)
  location /tiles/ {
    alias /data/assets/;
    try_files $uri =404;

    aio threads;
    
    gzip on;
    gzip_types application/json;
    gzip_comp_level 4;
    gzip_proxied any;
    gzip_vary on;

    types {
      application/json json;
      application/octet-stream b3dm i3dm cmpt glb;
    }
    default_type application/octet-stream;

    add_header Cache-Control $cc_header always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Range, Accept, Content-Type, Authorization" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
  }
}
