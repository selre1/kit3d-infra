map $uri $cc_header {
  default "";
  ~*\.json$ "public, max-age=300";
  ~*\.(glb|b3dm|i3dm|cmpt)$ "public, max-age=2592000";
}

server {
  listen 80;
  listen [::]:80;
  server_name localhost;

  resolver 127.0.0.11 valid=10s;

  set $front_upstream kit3d-front;
  set $back_upstream  kit3d-back;

  client_max_body_size 5g;

  gzip on;
  gzip_types *;
  gzip_comp_level 9;
  gzip_proxied any;
  gzip_vary on;

  location / {
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://$front_upstream;
  }

  location /api/v1/import/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    client_max_body_size 5g;
    proxy_request_buffering off;
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_buffering off;

    proxy_pass http://$back_upstream:8080;
  }

  location /api/v1/tile/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_buffering off;

    proxy_pass http://$back_upstream:8080;
  }

  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://$back_upstream:8080;
  }

  location /assets/ {
    alias /data/assets/;
    try_files $uri =404;

    add_header Cache-Control $cc_header always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Range, Accept, Content-Type, Authorization" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
  }

  location /tiles/ {
    alias /data/assets/;
    try_files $uri =404;

    types {
      application/json json;
      application/octet-stream b3dm i3dm cmpt glb;
    }
    default_type application/octet-stream;

    add_header Cache-Control $cc_header always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Range, Accept, Content-Type, Authorization" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
  }

  location ~ ^/dem/(.*\.terrain)$ {
    # reserved
  }
}